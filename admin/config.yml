backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
local_backend: true

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "_data/homepage.json"
        fields:
          - label: "Meta / SEO"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "OG Title", name: "og_title", widget: "string" }
              - { label: "OG Description", name: "og_description", widget: "text" }
              - { label: "OG Image", name: "og_image", widget: "string" }
              - { label: "Site URL", name: "site_url", widget: "string" }

          - label: "Navigation"
            name: "navigation"
            widget: "object"
            fields:
              - { label: "Brand", name: "brand", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
              - { label: "CTA Label", name: "cta_label", widget: "string" }
              - { label: "CTA URL", name: "cta_url", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading Line 1", name: "heading_line_1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line_2", widget: "string" }
              - { label: "Heading Line 3", name: "heading_line_3", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Primary Button Label", name: "primary_label", widget: "string" }
              - { label: "Primary Button URL", name: "primary_url", widget: "string" }
              - { label: "Secondary Button Label", name: "secondary_label", widget: "string" }
              - { label: "Secondary Button URL", name: "secondary_url", widget: "string" }
              - label: "Portraits"
                name: "portraits"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Symbol", name: "symbol", widget: "image" }
              - { label: "Heading Line 1", name: "heading_line_1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line_2", widget: "string" }
              - { label: "Heading Line 3", name: "heading_line_3", widget: "string" }
              - { label: "Body 1", name: "body_1", widget: "text" }
              - { label: "Pull Quote", name: "pull_quote", widget: "text" }
              - { label: "Body 2", name: "body_2", widget: "text" }
              - { label: "Button Label", name: "button_label", widget: "string" }
              - { label: "Button URL", name: "button_url", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "image_alt", widget: "string" }

          - label: "Course Cards"
            name: "courses"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading Line 1", name: "heading_line_1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line_2", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Poet", name: "poet", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Image Alt", name: "image_alt", widget: "string" }
                  - { label: "Badge", name: "badge", widget: "string" }
                  - { label: "Badge Class", name: "badge_class", widget: "select", options: ["badge-red", "badge-blue", "badge-dk"] }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Meta Line 1", name: "meta_1", widget: "string" }
                  - { label: "Meta Line 2", name: "meta_2", widget: "string", required: false }
                  - { label: "Link Label", name: "link_label", widget: "string" }
                  - { label: "Link URL", name: "link_url", widget: "string" }

          - label: "Featured Course"
            name: "featured"
            widget: "object"
            fields:
              - { label: "Section ID", name: "section_id", widget: "string" }
              - { label: "Course Class", name: "course_class", widget: "select", options: ["course-homer", "course-virgil", "course-dante", "course-milton"] }
              - { label: "Artwork Image", name: "art_image", widget: "image" }
              - { label: "Artwork Alt", name: "art_alt", widget: "string" }
              - { label: "Artwork Caption", name: "art_caption", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Title Line 1", name: "title_line_1", widget: "string" }
              - { label: "Title Line 2", name: "title_line_2", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Details"
                name: "details"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - { label: "Primary Button Label", name: "primary_label", widget: "string" }
              - { label: "Primary Button URL", name: "primary_url", widget: "string" }
              - { label: "Secondary Button Label", name: "secondary_label", widget: "string" }
              - { label: "Secondary Button URL", name: "secondary_url", widget: "string" }
              - label: "Accordion"
                name: "accordion"
                widget: "list"
                fields:
                  - { label: "Kicker", name: "kicker", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Content", name: "content", widget: "text" }

          - label: "Quote Banner"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Course Class", name: "course_class", widget: "select", options: ["course-homer", "course-virgil", "course-dante", "course-milton"] }
              - { label: "Text Line 1", name: "text_line_1", widget: "string" }
              - { label: "Text Line 2", name: "text_line_2", widget: "string" }
              - { label: "Attribution", name: "attribution", widget: "string" }

          - label: "Enrollment"
            name: "enrollment"
            widget: "object"
            fields:
              - { label: "Left Tag", name: "left_tag", widget: "string" }
              - { label: "Heading Line 1", name: "heading_line_1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line_2", widget: "string" }
              - { label: "Heading Line 3", name: "heading_line_3", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Price Note", name: "price_note", widget: "string" }
              - label: "Payment Methods"
                name: "payment_methods"
                widget: "list"
                field: { label: "Method", name: "method", widget: "string" }
              - { label: "Right Symbol", name: "right_symbol", widget: "image" }
              - { label: "Right Tag", name: "right_tag", widget: "string" }
              - { label: "Right Heading", name: "right_heading", widget: "string" }
              - { label: "Right Body 1", name: "right_body_1", widget: "text" }
              - { label: "Right Body 2", name: "right_body_2", widget: "text" }
              - { label: "Button Label", name: "button_label", widget: "string" }
              - { label: "Button URL", name: "button_url", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Symbol", name: "symbol", widget: "image" }
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Photo Credits", name: "photo_credits", widget: "text" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }

  - name: "theme"
    label: "Theme"
    files:
      - name: "theme"
        label: "Global Colors"
        file: "_data/theme.json"
        fields:
          - { label: "Cream", name: "cream", widget: "string" }
          - { label: "Warm", name: "warm", widget: "string" }
          - { label: "Ink", name: "ink", widget: "string" }
          - { label: "Char", name: "char", widget: "string" }
          - { label: "Gold", name: "gold", widget: "string" }
          - { label: "Gold 2", name: "gold2", widget: "string" }
          - { label: "Red", name: "red", widget: "string" }
          - { label: "Red 2", name: "red2", widget: "string" }
          - { label: "Muted", name: "mute", widget: "string" }
          - { label: "Rule", name: "rule", widget: "string" }

  - name: "site"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Site Metadata"
        file: "_data/site.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Social Image", name: "social_image", widget: "image" }
          - { label: "Brand", name: "brand", widget: "string" }

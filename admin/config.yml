backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
local_backend: true

collections:
  - name: "settings"
    label: "Homepage Content"
    files:
      - name: "site"
        label: "Site / Social"
        file: "_data/site.json"
        fields:
          - { label: "Browser/Social Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Social Image", name: "social_image", widget: "image" }
          - { label: "Brand Name", name: "brand", widget: "string" }

      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading Prefix", name: "heading_prefix", widget: "string" }
          - { label: "Heading Emphasis", name: "heading_emphasis", widget: "string" }
          - { label: "Heading Suffix", name: "heading_suffix", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - { label: "Primary Button Label", name: "primary_label", widget: "string" }
          - { label: "Primary Button Link", name: "primary_link", widget: "string" }
          - { label: "Secondary Button Label", name: "secondary_label", widget: "string" }
          - { label: "Secondary Button Link", name: "secondary_link", widget: "string" }
          - label: "Author Image Grid"
            name: "authors"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Seal/Symbol", name: "seal", widget: "image" }
          - { label: "Photo", name: "photo", widget: "image" }
          - { label: "Photo Alt Text", name: "photo_alt", widget: "string" }
          - { label: "Heading Prefix", name: "heading_prefix", widget: "string" }
          - { label: "Heading Emphasis", name: "heading_emphasis", widget: "string" }
          - { label: "Body Paragraph 1", name: "body_1", widget: "text" }
          - { label: "Body Paragraph 2", name: "body_2", widget: "text" }
          - { label: "Pull Quote", name: "pull_quote", widget: "text" }
          - { label: "Button Label", name: "button_label", widget: "string" }
          - { label: "Button Link", name: "button_link", widget: "string" }

      - name: "featured"
        label: "Featured Course + Quote Banner"
        file: "_data/featured.json"
        fields:
          - { label: "Section Tag", name: "tag", widget: "string" }
          - { label: "Artwork Image", name: "art_image", widget: "image" }
          - { label: "Artwork Alt Text", name: "art_alt", widget: "string" }
          - { label: "Artwork Caption", name: "art_caption", widget: "string" }
          - { label: "Title Prefix", name: "title_prefix", widget: "string" }
          - { label: "Title Emphasis", name: "title_emphasis", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Book Note", name: "book_note", widget: "text" }
          - { label: "Description (*italic* supported)", name: "description", widget: "text" }
          - label: "Details Row"
            name: "details"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - { label: "Primary Button Label", name: "primary_label", widget: "string" }
          - { label: "Primary Button Link", name: "primary_link", widget: "string" }
          - { label: "Secondary Button Label", name: "secondary_label", widget: "string" }
          - { label: "Secondary Button Link", name: "secondary_link", widget: "string" }
          - label: "Syllabus Tabs"
            name: "syllabus"
            widget: "list"
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }
          - { label: "Quote Banner Text", name: "quote_text", widget: "text" }
          - { label: "Quote Attribution", name: "quote_attribution", widget: "string" }
          - label: "Course Colors"
            name: "colors"
            widget: "object"
            fields:
              - { label: "Accent", name: "accent", widget: "string", hint: "Iliad red, Aeneid green/gold, Divine Comedy crimson/cream, Paradise Lost blue/gold" }
              - { label: "Accent Dark", name: "accent_dark", widget: "string" }
              - { label: "Accent Soft", name: "accent_soft", widget: "string", hint: "Example: rgba(101,19,24,.28)" }
              - { label: "Highlight", name: "highlight", widget: "string" }

      - name: "enroll"
        label: "Enrollment + Footer"
        file: "_data/enroll.json"
        fields:
          - { label: "Tag", name: "tag", widget: "string" }
          - { label: "Heading Prefix", name: "heading_prefix", widget: "string" }
          - { label: "Heading Emphasis", name: "heading_emphasis", widget: "string" }
          - { label: "Body", name: "body", widget: "text" }
          - { label: "Price", name: "price", widget: "string" }
          - { label: "Price Note", name: "price_note", widget: "string" }
          - label: "Payment Methods"
            name: "payment_methods"
            widget: "list"
            field: { label: "Method", name: "method", widget: "string" }
          - { label: "Right Heading", name: "right_heading", widget: "string" }
          - { label: "Right Body 1", name: "right_body_1", widget: "text" }
          - { label: "Right Body 2 (HTML ok)", name: "right_body_2", widget: "text" }
          - { label: "Footer Brand", name: "footer_brand", widget: "string" }
          - label: "Footer Links"
            name: "footer_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "courses"
    label: "Course Cards"
    files:
      - name: "iliad"
        label: "Homer's Iliad"
        file: "_data/courses/iliad.json"
        fields: &course_fields
          - { label: "Display Order", name: "order", widget: "number", value_type: "int" }
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Badge Class", name: "badge_class", widget: "select", options: ["badge-red", "badge-blue", "badge-dk"] }
          - { label: "Poet", name: "poet", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt Text", name: "image_alt", widget: "string" }
          - label: "Meta Lines"
            name: "meta"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - { label: "Link Label", name: "link_label", widget: "string" }
          - { label: "Link URL", name: "link_url", widget: "string" }
      - name: "aeneid"
        label: "Virgil's Aeneid"
        file: "_data/courses/aeneid.json"
        fields: *course_fields
      - name: "divine-comedy"
        label: "Dante's Divine Comedy"
        file: "_data/courses/divine-comedy.json"
        fields: *course_fields
      - name: "paradise-lost"
        label: "Milton's Paradise Lost"
        file: "_data/courses/paradise-lost.json"
        fields: *course_fields

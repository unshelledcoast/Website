backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
local_backend: true

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Controller"
        file: "_data/homepage.json"
        fields:
          - label: "Navigation"
            name: "navigation"
            widget: "object"
            fields:
              - { label: "Top CTA Label", name: "cta_label", widget: "string" }
              - { label: "Top CTA Link", name: "cta_link", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading Line 1", name: "heading_line_1", widget: "string" }
              - { label: "Heading Line 2", name: "heading_line_2", widget: "string" }
              - { label: "Heading Line 3", name: "heading_line_3", widget: "string" }

          - label: "Course Grid Order"
            name: "course_grid"
            widget: "object"
            fields:
              - { label: "Course 1", name: "course_1", widget: "select", options: ["iliad", "aeneid", "divine-comedy", "paradise-lost"] }
              - { label: "Course 2", name: "course_2", widget: "select", options: ["iliad", "aeneid", "divine-comedy", "paradise-lost"] }
              - { label: "Course 3", name: "course_3", widget: "select", options: ["iliad", "aeneid", "divine-comedy", "paradise-lost"] }
              - { label: "Course 4", name: "course_4", widget: "select", options: ["iliad", "aeneid", "divine-comedy", "paradise-lost"] }

          - label: "Featured Course"
            name: "featured_course"
            widget: "object"
            fields:
              - { label: "Active Course", name: "active_course", widget: "select", options: ["iliad", "aeneid", "divine-comedy", "paradise-lost"] }

  - name: "courses"
    label: "Courses"
    files:
      - name: "iliad"
        label: "Homer's Iliad"
        file: "_data/courses/iliad.json"
        fields: &course_fields
          - { label: "Slug", name: "slug", widget: "string" }
          - { label: "Status", name: "status", widget: "string" }
          - { label: "Badge Text", name: "badge", widget: "string" }
          - { label: "Badge Class", name: "badge_class", widget: "select", options: ["badge-red", "badge-blue", "badge-dk"] }
          - { label: "Poet", name: "poet", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Card Description", name: "card_description", widget: "text" }
          - { label: "Featured Subtitle", name: "featured_subtitle", widget: "text" }
          - { label: "Featured Description", name: "featured_description", widget: "text" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt", name: "image_alt", widget: "string" }
          - { label: "Artwork Caption", name: "art_caption", widget: "string" }
          - { label: "Price", name: "price", widget: "string" }
          - { label: "Schedule", name: "schedule", widget: "string" }

          - label: "Payment Methods"
            name: "payment_methods"
            widget: "list"
            field: { label: "Method", name: "method", widget: "string" }

          - label: "Details"
            name: "details"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }

      - name: "aeneid"
        label: "Virgil's Aeneid"
        file: "_data/courses/aeneid.json"
        fields: *course_fields

      - name: "divine-comedy"
        label: "Dante's Divine Comedy"
        file: "_data/courses/divine-comedy.json"
        fields: *course_fields

      - name: "paradise-lost"
        label: "Milton's Paradise Lost"
        file: "_data/courses/paradise-lost.json"
        fields: *course_fields

  - name: "theme"
    label: "Theme"
    files:
      - name: "theme"
        label: "Global Colors"
        file: "_data/theme.json"
        fields:
          - { label: "Cream", name: "cream", widget: "string" }
          - { label: "Warm", name: "warm", widget: "string" }
          - { label: "Ink", name: "ink", widget: "string" }
          - { label: "Char", name: "char", widget: "string" }
          - { label: "Gold", name: "gold", widget: "string" }
          - { label: "Gold 2", name: "gold2", widget: "string" }
          - { label: "Red", name: "red", widget: "string" }
          - { label: "Red 2", name: "red2", widget: "string" }
          - { label: "Muted", name: "mute", widget: "string" }
          - { label: "Rule", name: "rule", widget: "string" }

  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "navigation"
        label: "Navigation"
        file: "_data/navigation.json"
        fields:
          - { label: "Brand", name: "brand", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image" }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - name: "footer"
        label: "Footer"
        file: "_data/footer.json"
        fields:
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Copyright", name: "copyright", widget: "string" }
          - { label: "Photo Credits", name: "photo_credits", widget: "text" }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - name: "enrollment"
        label: "Enrollment"
        file: "_data/enrollment.json"
        fields:
          - { label: "Tag", name: "tag", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Body 1", name: "body_1", widget: "text" }
          - { label: "Body 2", name: "body_2", widget: "text" }
          - { label: "Price", name: "price", widget: "string" }
          - { label: "Price Note", name: "price_note", widget: "string" }
          - label: "Payment Methods"
            name: "payment_methods"
            widget: "list"
            field: { label: "Method", name: "method", widget: "string" }
          - { label: "Button Label", name: "button_label", widget: "string" }
          - { label: "Button URL", name: "button_url", widget: "string" }            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Seal/Symbol", name: "seal", widget: "image" }
          - { label: "Photo", name: "photo", widget: "image" }
          - { label: "Photo Alt Text", name: "photo_alt", widget: "string" }
          - { label: "Heading Prefix", name: "heading_prefix", widget: "string" }
          - { label: "Heading Emphasis", name: "heading_emphasis", widget: "string" }
          - { label: "Body Paragraph 1", name: "body_1", widget: "text" }
          - { label: "Body Paragraph 2", name: "body_2", widget: "text" }
          - { label: "Pull Quote", name: "pull_quote", widget: "text" }
          - { label: "Button Label", name: "button_label", widget: "string" }
          - { label: "Button Link", name: "button_link", widget: "string" }

      - name: "featured"
        label: "Featured Course + Quote Banner"
        file: "_data/featured.json"
        fields:
          - { label: "Section Tag", name: "tag", widget: "string" }
          - { label: "Artwork Image", name: "art_image", widget: "image" }
          - { label: "Artwork Alt Text", name: "art_alt", widget: "string" }
          - { label: "Artwork Caption", name: "art_caption", widget: "string" }
          - { label: "Title Prefix", name: "title_prefix", widget: "string" }
          - { label: "Title Emphasis", name: "title_emphasis", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Book Note", name: "book_note", widget: "text" }
          - { label: "Description (*italic* supported)", name: "description", widget: "text" }
          - label: "Details Row"
            name: "details"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - { label: "Primary Button Label", name: "primary_label", widget: "string" }
          - { label: "Primary Button Link", name: "primary_link", widget: "string" }
          - { label: "Secondary Button Label", name: "secondary_label", widget: "string" }
          - { label: "Secondary Button Link", name: "secondary_link", widget: "string" }
          - label: "Syllabus Tabs"
            name: "syllabus"
            widget: "list"
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }
          - { label: "Quote Banner Text", name: "quote_text", widget: "text" }
          - { label: "Quote Attribution", name: "quote_attribution", widget: "string" }
          - label: "Course Colors"
            name: "colors"
            widget: "object"
            fields:
              - { label: "Accent", name: "accent", widget: "string", hint: "Iliad red, Aeneid green/gold, Divine Comedy crimson/cream, Paradise Lost blue/gold" }
              - { label: "Accent Dark", name: "accent_dark", widget: "string" }
              - { label: "Accent Soft", name: "accent_soft", widget: "string", hint: "Example: rgba(101,19,24,.28)" }
              - { label: "Highlight", name: "highlight", widget: "string" }

      - name: "enroll"
        label: "Enrollment + Footer"
        file: "_data/enroll.json"
        fields:
          - { label: "Tag", name: "tag", widget: "string" }
          - { label: "Heading Prefix", name: "heading_prefix", widget: "string" }
          - { label: "Heading Emphasis", name: "heading_emphasis", widget: "string" }
          - { label: "Body", name: "body", widget: "text" }
          - { label: "Price", name: "price", widget: "string" }
          - { label: "Price Note", name: "price_note", widget: "string" }
          - label: "Payment Methods"
            name: "payment_methods"
            widget: "list"
            field: { label: "Method", name: "method", widget: "string" }
          - { label: "Right Heading", name: "right_heading", widget: "string" }
          - { label: "Right Body 1", name: "right_body_1", widget: "text" }
          - { label: "Right Body 2 (HTML ok)", name: "right_body_2", widget: "text" }
          - { label: "Footer Brand", name: "footer_brand", widget: "string" }
          - label: "Footer Links"
            name: "footer_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "courses"
    label: "Course Cards"
    files:
      - name: "iliad"
        label: "Homer's Iliad"
        file: "_data/courses/iliad.json"
        fields: &course_fields
          - { label: "Display Order", name: "order", widget: "number", value_type: "int" }
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Badge Class", name: "badge_class", widget: "select", options: ["badge-red", "badge-blue", "badge-dk"] }
          - { label: "Poet", name: "poet", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt Text", name: "image_alt", widget: "string" }
          - label: "Meta Lines"
            name: "meta"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - { label: "Link Label", name: "link_label", widget: "string" }
          - { label: "Link URL", name: "link_url", widget: "string" }
      - name: "aeneid"
        label: "Virgil's Aeneid"
        file: "_data/courses/aeneid.json"
        fields: *course_fields
      - name: "divine-comedy"
        label: "Dante's Divine Comedy"
        file: "_data/courses/divine-comedy.json"
        fields: *course_fields
      - name: "paradise-lost"
        label: "Milton's Paradise Lost"
        file: "_data/courses/paradise-lost.json"
        fields: *course_fields
